<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalPro | Expedientes Clínicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .diente { width: 32px; height: 42px; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .estado-sano { background-color: #f0fdf4; border-color: #22c55e; color: #166534; }
        .estado-caries { background-color: #fef2f2; border-color: #ef4444; color: #991b1b; }
        .estado-tratado { background-color: #eff6ff; border-color: #3b82f6; color: #1e40af; }
    </style>
</head>
<body class="bg-slate-100" x-data="dentalApp()" x-init="init()">

    <div class="flex min-h-screen">
        <nav class="w-64 bg-slate-900 text-white p-6 shadow-xl flex flex-col">
            <h1 class="text-2xl font-bold text-blue-400 mb-8 text-center">🦷 DentalPro</h1>
            <ul class="space-y-3 flex-1">
                <li @click="view = 'pacientes'; pacienteSeleccionado = null" :class="view === 'pacientes' ? 'bg-blue-600' : ''" class="p-3 rounded-lg cursor-pointer hover:bg-slate-800 transition">👥 Lista de Pacientes</li>
                <li @click="view = 'agenda'" :class="view === 'agenda' ? 'bg-blue-600' : ''" class="p-3 rounded-lg cursor-pointer hover:bg-slate-800 transition">📅 Agenda Global</li>
                <li @click="view = 'inventario'" :class="view === 'inventario' ? 'bg-blue-600' : ''" class="p-3 rounded-lg cursor-pointer hover:bg-slate-800 transition">📦 Inventario</li>
            </ul>
        </nav>

        <main class="flex-1 p-8">
            
            <template x-if="view === 'pacientes' && !pacienteSeleccionado">
                <div x-cloak>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-slate-800">Expedientes Clínicos</h2>
                        <button @click="nuevoPaciente()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 shadow-lg">+ Registrar Nuevo Paciente</button>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <template x-for="(p, index) in pacientes" :key="index">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition cursor-pointer" @click="abrirExpediente(index)">
                                <div class="flex items-center gap-4 mb-4">
                                    <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xl" x-text="p.nombre[0]"></div>
                                    <div>
                                        <h3 class="font-bold text-lg text-slate-800" x-text="p.nombre"></h3>
                                        <p class="text-sm text-slate-500" x-text="p.telefono"></p>
                                    </div>
                                </div>
                                <div class="flex justify-between items-center text-xs text-slate-400 border-t pt-4">
                                    <span x-text="'ID: ' + p.id"></span>
                                    <span class="text-blue-600 font-semibold">Ver Folder →</span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template x-if="pacienteSeleccionado !== null">
                <div x-cloak class="animate-fadeIn">
                    <button @click="pacienteSeleccionado = null" class="mb-4 text-blue-600 font-semibold hover:underline">← Volver a la lista</button>
                    
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                        <div class="bg-slate-50 p-8 border-b border-slate-200 flex justify-between items-center">
                            <div>
                                <h2 class="text-4xl font-bold text-slate-800" x-text="pacientes[pacienteSeleccionado].nombre"></h2>
                                <p class="text-slate-500">📞 <span x-text="pacientes[pacienteSeleccionado].telefono"></span> | 📧 <span x-text="pacientes[pacienteSeleccionado].correo"></span></p>
                            </div>
                            <button @click="eliminarPaciente(pacienteSeleccionado)" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-100">Eliminar Expediente</button>
                        </div>

                        <div class="grid grid-cols-1 lg:grid-cols-3">
                            <div class="lg:col-span-2 p-8 border-r border-slate-100">
                                <h3 class="font-bold text-xl mb-6 text-slate-700">Odontograma del Paciente</h3>
                                <div class="bg-slate-50 p-6 rounded-2xl mb-8">
                                    <div class="flex flex-wrap gap-2 justify-center mb-6">
                                        <template x-for="d in pacientes[pacienteSeleccionado].odontograma.sup">
                                            <div @click="toggleDiente(d)" :class="d.estado" class="diente" x-text="d.id"></div>
                                        </template>
                                    </div>
                                    <div class="flex flex-wrap gap-2 justify-center">
                                        <template x-for="d in pacientes[pacienteSeleccionado].odontograma.inf">
                                            <div @click="toggleDiente(d)" :class="d.estado" class="diente" x-text="d.id"></div>
                                        </template>
                                    </div>
                                </div>

                                <h3 class="font-bold text-xl mb-4 text-slate-700">Notas Médicas / Evolución</h3>
                                <textarea x-model="pacientes[pacienteSeleccionado].notas" @input="guardar()" class="w-full p-4 bg-yellow-50 border-none rounded-xl text-slate-700 shadow-inner" rows="5" placeholder="Escribe aquí el historial clínico, alergias o evolución..."></textarea>
                            </div>

                            <div class="p-8 bg-slate-50/50">
                                <h3 class="font-bold text-xl mb-6 text-slate-700">📄 Recetas Generadas</h3>
                                <div class="space-y-4 mb-6">
                                    <template x-for="(receta, rIndex) in pacientes[pacienteSeleccionado].recetas" :key="rIndex">
                                        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                                            <div>
                                                <p class="text-sm font-bold text-slate-700" x-text="receta.fecha"></p>
                                                <p class="text-xs text-slate-500 truncate w-32" x-text="receta.texto"></p>
                                            </div>
                                            <button @click="descargarPDF(receta, pacientes[pacienteSeleccionado].nombre)" class="text-blue-600 hover:text-blue-800 text-xl">📥</button>
                                        </div>
                                    </template>
                                </div>
                                <button @click="crearReceta()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700">+ Nueva Receta</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            
            </main>
    </div>

    <script>
        function dentalApp() {
            return {
                view: 'pacientes',
                pacientes: [],
                pacienteSeleccionado: null,

                init() {
                    const saved = localStorage.getItem('dentalPro_v3');
                    if (saved) {
                        this.pacientes = JSON.parse(saved);
                    }
                },

                guardar() {
                    localStorage.setItem('dentalPro_v3', JSON.stringify(this.pacientes));
                },

                nuevoPaciente() {
                    const nombre = prompt("Nombre completo del paciente:");
                    if (!nombre) return;
                    const telefono = prompt("Teléfono:");
                    const correo = prompt("Correo electrónico:");
                    
                    const nuevo = {
                        id: Date.now().toString().slice(-5),
                        nombre,
                        telefono: telefono || 'Sin teléfono',
                        correo: correo || 'Sin correo',
                        notas: '',
                        recetas: [],
                        odontograma: {
                            sup: [18,17,16,15,14,13,12,11,21,22,23,24,25,26,27,28].map(n => ({id: n, estado: 'estado-sano'})),
                            inf: [48,47,46,45,44,43,42,41,31,32,33,34,35,36,37,38].map(n => ({id: n, estado: 'estado-sano'}))
                        }
                    };
                    
                    this.pacientes.push(nuevo);
                    this.guardar();
                },

                abrirExpediente(index) {
                    this.pacienteSeleccionado = index;
                },

                toggleDiente(diente) {
                    const estados = ['estado-sano', 'estado-caries', 'estado-tratado'];
                    let actual = estados.indexOf(diente.estado);
                    diente.estado = estados[(actual + 1) % estados.length];
                    this.guardar();
                },

                crearReceta() {
                    const texto = prompt("Escriba la prescripción médica:");
                    if (!texto) return;
                    const fecha = new Date().toLocaleDateString();
                    this.pacientes[this.pacienteSeleccionado].recetas.unshift({ fecha, texto });
                    this.guardar();
                },

                eliminarPaciente(index) {
                    if(confirm("¿Seguro que deseas borrar TODO el expediente de este paciente?")) {
                        this.pacientes.splice(index, 1);
                        this.pacienteSeleccionado = null;
                        this.guardar();
                    }
                },

                descargarPDF(receta, nombrePaciente) {
                    const doc = document.createElement('div');
                    doc.innerHTML = `
                        <div style="padding: 40px; font-family: sans-serif;">
                            <h1 style="color: #1e40af; border-bottom: 2px solid #1e40af;">RECETA MÉDICA ODONTOLÓGICA</h1>
                            <p><strong>Paciente:</strong> ${nombrePaciente}</p>
                            <p><strong>Fecha:</strong> ${receta.fecha}</p>
                            <div style="margin-top: 40px; padding: 20px; background: #f8fafc; border-radius: 10px;">
                                <h3>Rp:</h3>
                                <p style="white-space: pre-wrap;">${receta.texto}</p>
                            </div>
                        </div>
                    `;
                    html2pdf().from(doc).save(`Receta_${nombrePaciente}_${receta.fecha}.pdf`);
                }
            }
        }
    </script>
</body>
</html>
